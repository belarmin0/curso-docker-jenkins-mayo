apiVersion: v1
kind: Namespace
metadata: 
  name: curso-contenedores
  labels:
    app: curso-contenedores

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: curso-contenedores-config
data:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: curso_contenedores
  ENABLE_DB: "false"
  APP_VERSION: 1.0.0

---
apiVersion: v1
kind: Secret
metadata:
  name: curso-contenedores-secret
type: Opaque
stringData:
  POSTGRES_PASSWORD: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: curso-contenedores
  namespace: curso-contenedores
  labels:
    app: curso-contenedores
spec:
  replicas: 10
  selector:
    matchLabels:
      app: curso-contenedores
  template:
    metadata:
      labels:
         app: curso-contenedores
    spec:
      containers:
        - name: curso-contenedores
          image: carlosmarind/curso-contenedores:latest
          imagePullPolicy: Always
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: curso-contenedores-config
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: curso-contenedores-config
                  key: POSTGRES_DB
            - name: ENABLE_DB
              valueFrom:
                configMapKeyRef:
                  name: curso-contenedores-config
                  key: ENABLE_DB
            - name: APP_VERSION
              valueFrom:
                configMapKeyRef:
                  name: curso-contenedores-config
                  key: APP_VERSION
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: curso-contenedores-secret
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: curso-contenedores
  namespace: curso-contenedores
  labels:
    app: curso-contenedores
spec:
  type: ClusterIP
  selector:
    app: curso-contenedores
  ports:
    - name: http
      port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: curso-contenedores
  labels:
    app.kubernetes.io/name: curso-contenedores
    app: curso-contenedores
spec:
  ingressClassName: nginx
  rules:
  - host: contenedors.curso.cl
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: curso-contenedores
            port: 
              number: 80
