name: curso-contenedores
services:
  db-app:
    image: postgres:18
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "6"
          memory: "512M"
        # Los reservation solo aplican para swarm, pero so validos aca
        reservations:
          cpus: "2"
          memory: "256M"
    networks:
      - app-network
  backend:
    image: curso-backend
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      db-app:
        condition: service_healthy
    environment:
      ENABLE_DB: ${ENABLE_DB:-false}
      DB_HOST: db-app
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      APP_VERSION: ${APP_VERSION:-1.0.0}
    ports:
      - "3000:3000"
    networks:
      - app-network
volumes:
  db_data:
networks:
  app-network:
    driver: bridge
